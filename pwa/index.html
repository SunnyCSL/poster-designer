<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Poster Designer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --surface2: #21262D;
      --border: #30363D;
      --text: #E6EDF3;
      --text-dim: #8B949E;
      --accent: #58A6FF;
      --danger: #F85149;
      --top-h: 44px;
      --bottom-h: 56px;
      --ctx-h: 44px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── Top bar ── */
    #top-bar {
      height: var(--top-h);
      padding-top: var(--safe-top);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }
    #top-bar .title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:active { background: var(--surface2); }
    .icon-btn:disabled { opacity: 0.4; pointer-events: none; }
    .top-left, .top-right { display: flex; align-items: center; }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--bg);
      touch-action: none;
    }
    #poster-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      touch-action: none;
    }

    /* ── Contextual toolbar ── */
    #ctx-bar {
      height: var(--ctx-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    #ctx-bar.visible { display: flex; }
    .ctx-label {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 40px;
    }
    .ctx-slider {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    .ctx-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .ctx-color {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      padding: 0;
      cursor: pointer;
      overflow: hidden;
    }
    .ctx-color input { opacity: 0; width: 200%; height: 200%; margin: -50%; cursor: pointer; }

    /* ── Bottom toolbar ── */
    #bottom-bar {
      height: calc(var(--bottom-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      z-index: 10;
    }
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-width: 52px;
      height: 52px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s;
      padding: 0 4px;
    }
    .tool-btn span {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1;
    }
    .tool-btn:active { background: var(--surface2); }

    /* ── Error banner ── */
    #error-banner {
      position: fixed;
      top: calc(var(--top-h) + var(--safe-top) + 8px);
      left: 12px;
      right: 12px;
      background: var(--danger);
      color: #fff;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
      z-index: 100;
      align-items: center;
      gap: 8px;
    }
    #error-banner.visible { display: flex; }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── More menu overlay ── */
    #menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      z-index: 50;
      align-items: flex-end;
      justify-content: center;
    }
    #menu-overlay.visible { display: flex; }
    #menu-sheet {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 400px;
      padding: 8px 0 calc(var(--safe-bottom) + 16px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      font-size: 15px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .menu-item:active { background: var(--surface2); }
    .menu-item.danger { color: var(--danger); }
    .menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Shape picker ── */
    #shape-picker {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      z-index: 60;
      align-items: flex-end;
      justify-content: center;
    }
    #shape-picker.visible { display: flex; }
    #shape-sheet {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 400px;
      max-height: 360px;
      overflow-y: auto;
      padding: 8px 0 calc(var(--safe-bottom) + 16px);
    }
    .shape-category {
      border-bottom: 1px solid var(--border);
    }
    .shape-category:last-child { border-bottom: none; }
    .shape-category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      user-select: none;
    }
    .shape-category-header:hover { color: var(--text); }
    .shape-category-chevron {
      transition: transform 0.2s ease;
      font-size: 10px;
    }
    .shape-category.collapsed .shape-category-chevron { transform: rotate(-90deg); }
    .shape-category-items {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 4px 12px 12px;
    }
    .shape-category.collapsed .shape-category-items { display: none; }
    .shape-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--surface2);
    }
    .shape-opt:hover { background: var(--border); }
    .shape-opt:active { background: var(--accent); }
    .shape-opt-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .shape-opt-icon svg { width: 24px; height: 24px; }
    .shape-opt-label { font-size: 10px; color: var(--text-dim); text-align: center; }
    .shape-opt:hover .shape-opt-label { color: var(--text); }

    /* ── Delete button ── */
    #delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 16px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
    }
    #delete-btn:active { background: rgba(248, 81, 73, 0.15); }

    /* ── Connection status ── */
    .conn-status {
      font-size: 12px;
      margin-left: 6px;
      opacity: 0.8;
    }

    /* ── Agent editing badge ── */
    .agent-badge {
      font-size: 12px;
      color: var(--accent);
      background: rgba(88, 166, 255, 0.12);
      border: 1px solid rgba(88, 166, 255, 0.3);
      border-radius: 12px;
      padding: 2px 10px;
      margin-left: 8px;
      white-space: nowrap;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Synced flash ── */
    #sync-flash {
      position: fixed;
      top: calc(var(--top-h) + var(--safe-top) + 8px);
      right: 12px;
      background: rgba(88, 166, 255, 0.9);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      display: none;
      z-index: 100;
      pointer-events: none;
    }
    #sync-flash.visible { display: block; animation: flashFade 1.5s ease forwards; }
    @keyframes flashFade { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--text-dim);font-size:13px;">Connecting to server…</div>
</div>

<!-- Error banner -->
<div id="error-banner">
  <span>⚠️</span><span id="error-msg">Server unreachable</span>
</div>

<!-- Sync flash indicator -->
<div id="sync-flash">✓ Synced</div>

<div id="app">
  <!-- Top bar -->
  <header id="top-bar">
    <div class="top-left">
      <button class="icon-btn" id="btn-back" title="Back">⇦</button>
      <span class="title" id="doc-title">Poster Designer</span>
      <span id="conn-status" class="conn-status" title="Connection status">🔴</span>
      <span id="agent-badge" class="agent-badge" style="display:none">✏️ Nexi is editing…</span>
    </div>
    <div class="top-right">
      <button class="icon-btn" id="btn-undo" title="Undo (↩)">↩</button>
      <button class="icon-btn" id="btn-redo" title="Redo (↪)" disabled>↪</button>
    </div>
  </header>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="poster-canvas"></canvas>
  </div>

  <!-- Contextual toolbar (shown when element selected) -->
  <div id="ctx-bar">
    <button class="icon-btn" id="ctx-delete" title="Delete">🗑</button>
    <span class="ctx-label" id="ctx-label">Size</span>
    <input type="range" class="ctx-slider" id="ctx-size" min="8" max="200" value="24">
    <span class="ctx-label" id="ctx-label2">Color</span>
    <div class="ctx-color" id="ctx-color-wrap">
      <input type="color" id="ctx-color" value="#ffffff">
    </div>
  </div>

  <!-- Bottom toolbar -->
  <nav id="bottom-bar">
    <button class="tool-btn" id="btn-image" title="Add Image">
      🖼️<span>Image</span>
    </button>
    <button class="tool-btn" id="btn-text" title="Add Text">
      📝<span>Text</span>
    </button>
    <button class="tool-btn" id="btn-shape" title="Add Shape">
      ⬡<span>Shape</span>
    </button>
    <button class="tool-btn" id="btn-bg" title="Background">
      🎨<span>BG</span>
    </button>
    <button class="tool-btn" id="btn-export" title="Export">
      ⬇️<span>Export</span>
    </button>
    <button class="tool-btn" id="btn-more" title="More">
      ☰<span>More</span>
    </button>
  </nav>
</div>

<!-- More menu -->
<div id="menu-overlay">
  <div id="menu-sheet">
    <div class="menu-item" id="menu-templates">📋 Templates</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="menu-about">ℹ️ About</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" id="menu-reset">🔄 New Design</div>
  </div>
</div>

<!-- Shape picker -->
<div id="shape-picker">
  <div id="shape-sheet">
    <!-- Categories rendered by JS -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script>
// =============================================================================
// Server URL — from URL param ?server= or window.location.origin or default
// =============================================================================
const SERVER = (() => {
  const params = new URLSearchParams(window.location.search);
  const s = params.get('server');
  if (s) return s;
  if (window.location.origin !== 'null' && !window.location.origin.includes('://localhost')) {
    return window.location.origin;
  }
  return 'http://localhost:8000';
})();

// =============================================================================
// DPI / unit conversion
// =============================================================================
const DPI = 300;
const MM_PER_INCH = 25.4;
function mmToPx(mm) { return mm * DPI / MM_PER_INCH; }
function pxToMm(px) { return px / DPI * MM_PER_INCH; }

// =============================================================================
// Shape library — all shapes with SVG icons + fabric.js factory
// =============================================================================
const SHAPES = {
  // ── BASIC ──────────────────────────────────────────────────────────────────
  rect: {
    label: 'Rectangle', category: 'Basic', emoji: '🟪',
    svg: `<rect x="4" y="6" width="20" height="14" rx="2" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Rect({
      left: x, top: y, width: w, height: h,
      fill: style.fillColor || style.color || '#58A6FF',
      originX: 'left', originY: 'top', angle, rx: 4, ry: 4,
    }),
  },
  circle: {
    label: 'Circle', category: 'Basic', emoji: '⭕',
    svg: `<circle cx="14" cy="14" r="10" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Circle({
      left: x, top: y, radius: Math.min(w, h) / 2,
      fill: style.fillColor || style.color || '#58A6FF',
      originX: 'left', originY: 'top', angle,
    }),
  },
  triangle: {
    label: 'Triangle', category: 'Basic', emoji: '🔺',
    svg: `<polygon points="14,2 26,26 2,26" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Triangle({
      left: x, top: y, width: w, height: h,
      fill: style.fillColor || style.color || '#58A6FF',
      originX: 'left', originY: 'top', angle,
    }),
  },
  line: {
    label: 'Line', category: 'Basic', emoji: '➖',
    svg: `<line x1="2" y1="14" x2="26" y2="14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Line([x, y, x + w, y], {
      stroke: style.strokeColor || style.color || '#58A6FF',
      strokeWidth: style.strokeWidth || 3,
    }),
  },
  star: {
    label: 'Star', category: 'Basic', emoji: '⭐',
    svg: `<polygon points="14,1 17.5,9 26,9 19.5,14.5 22,23 14,18 6,23 8.5,14.5 2,9 10.5,9" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M0,-50 L12,-18 L47,-15 L21,9 L29,42 L0,24 L-29,42 L-21,9 L-47,-15 L-12,-18 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  pentagon: {
    label: 'Pentagon', category: 'Basic', emoji: '⬠',
    svg: `<polygon points="14,1 26,9 22,25 6,25 2,9" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M0,-50 L48,-15 L29,41 L-29,41 L-48,-15 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  hexagon: {
    label: 'Hexagon', category: 'Basic', emoji: '⬡',
    svg: `<polygon points="14,1 25,7 25,21 14,27 3,21 3,7" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M0,-50 L43,-25 L43,25 L0,50 L-43,25 L-43,-25 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  octagon: {
    label: 'Octagon', category: 'Basic', emoji: '🟧',
    svg: `<polygon points="7,1 21,1 27,7 27,21 21,27 7,27 1,21 1,7" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M-21,-50 L21,-50 L50,-21 L50,21 L21,50 L-21,50 L-50,21 L-50,-21 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  diamond: {
    label: 'Diamond', category: 'Basic', emoji: '🔷',
    svg: `<polygon points="14,1 27,14 14,27 1,14" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M0,-50 L40,0 L0,50 L-40,0 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  parallelogram: {
    label: 'Parallelogram', category: 'Basic', emoji: '▱',
    svg: `<polygon points="5,5 25,5 20,23 0,23" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M-40,-30 L50,-30 L40,30 L-50,30 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  trapezoid: {
    label: 'Trapezoid', category: 'Basic', emoji: '🔷',
    svg: `<polygon points="3,7 25,7 20,25 8,25" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M-50,-35 L50,-35 L35,35 L-35,35 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  'triangle-right': {
    label: 'Triangle R', category: 'Basic', emoji: '▶',
    svg: `<polygon points="4,4 24,14 4,24" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M-50,-40 L40,-40 L40,40 L-50,-40 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },

  // ── ARROWS ─────────────────────────────────────────────────────────────────
  'arrow-right': {
    label: 'Arrow →', category: 'Arrows', emoji: '➡',
    svg: `<polygon points="1,14 21,14 21,6 28,14 21,22 21,14" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M-50,0 L30,0 L30,-25 L60,0 L30,25 L30,0 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  'arrow-left': {
    label: 'Arrow ←', category: 'Arrows', emoji: '⬅',
    svg: `<polygon points="27,14 7,14 7,6 0,14 7,22 7,14" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M50,0 L-30,0 L-30,-25 L-60,0 L-30,25 L-30,0 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },
  'arrow-up': {
    label: 'Arrow ↑', category: 'Arrows', emoji: '⬆',
    svg: `<polygon points="14,1 14,21 6,21 14,28 22,21 14,21" fill="currentColor"/>`,
    fabric: (style, x, y, w, h, angle) => new fabric.Path(
      'M0,50 L0,-30 L-25,-30 L0,-60 L25,-30 L0,-30 Z', {
        left: x, top: y, scaleX: w / 100, scaleY: h / 100,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      }
    ),
  },

// Group shapes by category
const SHAPE_CATEGORIES = ['Basic', 'Arrows', 'Symbols', 'Nature'];

// Render the shape picker categories HTML
function renderShapePicker() {
  const sheet = document.getElementById('shape-sheet');
  sheet.innerHTML = '';

  for (const cat of SHAPE_CATEGORIES) {
    const shapes = Object.entries(SHAPES).filter(([, s]) => s.category === cat);
    if (!shapes.length) continue;

    const catDiv = document.createElement('div');
    catDiv.className = 'shape-category';
    catDiv.dataset.category = cat;

    catDiv.innerHTML = `
      <div class="shape-category-header">
        <span class="shape-category-title">${cat}</span>
        <span class="shape-category-chevron">▼</span>
      </div>
      <div class="shape-category-items">
        ${shapes.map(([id, s]) => `
          <div class="shape-opt" data-shape="${id}">
            <div class="shape-opt-icon">
              <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: var(--text-dim)">
                ${s.svg}
              </svg>
            </div>
            <span class="shape-opt-label">${s.label}</span>
          </div>
        `).join('')}
      </div>
    `;

    // Collapsible header
    catDiv.querySelector('.shape-category-header').addEventListener('click', () => {
      catDiv.classList.toggle('collapsed');
    });

    // Shape option clicks (delegated)
    catDiv.querySelectorAll('.shape-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        const shape = opt.dataset.shape;
        hideShapePicker();
        addShapeToCanvas(shape);
      });
    });

    sheet.appendChild(catDiv);
  }
}

// Add a shape to canvas by shape ID
async function addShapeToCanvas(shapeId) {
  const def = SHAPES[shapeId];
  if (!def) return;

  try {
    const res = await fetch(`${SERVER}/api/element`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'shape',
        shape: shapeId,
        style: { color: '#58A6FF', fillColor: '#58A6FF', strokeColor: '#58A6FF' },
        position: { x: 80, y: 80, width: 60, height: 60 },
      }),
    });
    if (!res.ok) throw new Error();
    const el = await res.json();
    addElementToCanvas(el, true);
    const active = fabricCanvas.getActiveObject();
    if (active) active.elementId = el.id;
  } catch {
    showError('Failed to add shape');
  }
}

// Initialize shape picker on load
function initShapePicker() {
  renderShapePicker();

  // Close on overlay click
  document.getElementById('shape-picker').addEventListener('click', (e) => {
    if (e.target.id === 'shape-picker') hideShapePicker();
  });
}

// =============================================================================
// Fabric.js canvas
// =============================================================================
const canvasWrap = document.getElementById('canvas-wrap');
const canvasEl = document.getElementById('poster-canvas');

const fabricCanvas = new fabric.Canvas('poster-canvas', {
  preserveObjectStacking: true,
  stopContextMenu: true,
  fireRightClick: true,
  width: mmToPx(297),   // default A4
  height: mmToPx(210),
});

// Global state
let currentState = null;   // full state from server
let selectedId = null;    // id of currently selected element

// =============================================================================
// Utility
// =============================================================================
function showError(msg) {
  const el = document.getElementById('error-banner');
  document.getElementById('error-msg').textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 4000);
}

function showLoading(show) {
  const el = document.getElementById('loading');
  if (show) el.classList.remove('hidden');
  else el.classList.add('hidden');
}

function hideMenu() {
  document.getElementById('menu-overlay').classList.remove('visible');
}

function hideShapePicker() {
  document.getElementById('shape-picker').classList.remove('visible');
}

// =============================================================================
// Canvas sizing & zoom
// =============================================================================
function fitCanvas(canvasWidthPx, canvasHeightPx) {
  const wrap = canvasWrap.getBoundingClientRect();
  const scaleX = wrap.width / canvasWidthPx;
  const scaleY = wrap.height / canvasHeightPx;
  const scale = Math.min(scaleX, scaleY) * 0.9;

  fabricCanvas.setWidth(canvasWidthPx * scale);
  fabricCanvas.setHeight(canvasHeightPx * scale);
  fabricCanvas.setZoom(scale);

  // Position the element
  canvasEl.style.transform = `translate(0, 0)`;

  fabricCanvas.renderAll();
}

function resizeCanvas() {
  if (!currentState) return;
  const meta = currentState.meta;
  const w = mmToPx(meta.width_mm);
  const h = mmToPx(meta.height_mm);
  fabricCanvas.setWidth(w);
  fabricCanvas.setHeight(h);
  fitCanvas(w, h);
}

// =============================================================================
// Render state → Fabric canvas
// =============================================================================
function renderCanvas(state) {
  fabricCanvas.clear();

  const meta = state.meta;
  const bg = state.background;

  // Background
  if (bg.type === 'solid') {
    fabricCanvas.backgroundColor = bg.color || '#ffffff';
  } else if (bg.type === 'gradient' && bg.gradient) {
    const { angle, stops } = bg.gradient;
    const deg = (angle || 0) * Math.PI / 180;
    const x1 = 50 + 50 * Math.cos(deg);
    const y1 = 50 + 50 * Math.sin(deg);
    const g = new fabric.Gradient({
      type: 'linear',
      gradientUnits: 'percentage',
      coords: { x1: 50, y1: 50, x2: x1, y2: y1 },
      colorStops: stops.map((s, i) => ({ offset: i / (stops.length - 1), color: s.color })),
    });
    fabricCanvas.backgroundColor = g;
  } else {
    fabricCanvas.backgroundColor = '#ffffff';
  }

  // Elements
  for (const el of (state.elements || [])) {
    addElementToCanvas(el, false);
  }

  fabricCanvas.renderAll();
  resizeCanvas();
}

// =============================================================================
// Add one element to Fabric canvas
// =============================================================================
function addElementToCanvas(el, selectIt = true) {
  const pos = el.position || {};
  const style = el.style || {};

  const x = mmToPx(pos.x || 0);
  const y = mmToPx(pos.y || 0);
  const w = mmToPx(pos.width || 50);
  const h = mmToPx(pos.height || 20);
  const angle = pos.rotation || 0;

  let obj = null;

  if (el.type === 'text' || el.type === 'textbox') {
    obj = new fabric.Textbox(el.content || 'Text', {
      left: x,
      top: y,
      width: w,
      fontFamily: style.fontFamily || 'Noto Sans',
      fontSize: style.fontSize || 24,
      fontWeight: style.fontWeight || '400',
      fill: style.color || '#000000',
      textAlign: style.textAlign || 'left',
      lineHeight: style.lineHeight || 1.4,
      originX: 'left',
      originY: 'top',
      angle,
    });
  } else if (el.type === 'shape' || el.shape) {
    const shapeType = el.shape || style.shape || 'rect';
    const def = SHAPES[shapeType];
    if (def) {
      const result = def.fabric(style, x, y, w, h, angle);
      if (Array.isArray(result)) {
        obj = result; // sun etc returns array
      } else {
        obj = result;
      }
    } else {
      // Fallback to rect
      obj = new fabric.Rect({
        left: x, top: y, width: w, height: h,
        fill: style.fillColor || style.color || '#58A6FF',
        originX: 'left', originY: 'top', angle,
      });
    }
  } else if (el.type === 'image') {
    fabric.Image.fromURL(el.content || '', (img) => {
      img.set({ left: x, top: y, scaleX: w / (img.width || 1), scaleY: h / (img.height || 1), angle });
      img.setCoords();
      fabricCanvas.add(img);
      fabricCanvas.renderAll();
    });
    return; // async — don't add synchronously
  }

  if (obj) {
    if (Array.isArray(obj)) {
      obj.forEach(o => {
        o.set({ selectable: !el.locked, evented: !el.locked, visible: el.visible !== false });
        o.setCoords();
        fabricCanvas.add(o);
        if (selectIt) fabricCanvas.setActiveObject(o);
      });
    } else {
      obj.set({ selectable: !el.locked, evented: !el.locked, visible: el.visible !== false });
      obj.setCoords();
      fabricCanvas.add(obj);
      if (selectIt) fabricCanvas.setActiveObject(obj);
    }
  }
}

// =============================================================================
// Sync element selection to contextual toolbar
// =============================================================================
function updateContextBar() {
  const ctxBar = document.getElementById('ctx-bar');
  const active = fabricCanvas.getActiveObject();

  if (!active) {
    ctxBar.classList.remove('visible');
    selectedId = null;
    return;
  }

  ctxBar.classList.add('visible');

  // Find element id from custom prop
  const id = active.elementId;
  selectedId = id || null;

  const sizeInput = document.getElementById('ctx-size');
  const colorInput = document.getElementById('ctx-color');
  const ctxLabel = document.getElementById('ctx-label');

  if (active.type === 'textbox' || active.type === 'text') {
    sizeInput.value = active.fontSize || 24;
    colorInput.value = active.fill || '#ffffff';
    ctxLabel.textContent = 'Size';
    document.getElementById('ctx-label2').textContent = 'Color';
  } else if (active.type === 'circle' || active.type === 'rect' || active.type === 'triangle') {
    sizeInput.value = Math.round((active.width || 50));
    colorInput.value = active.fill || '#58A6FF';
    ctxLabel.textContent = 'Width';
    document.getElementById('ctx-label2').textContent = 'Fill';
  }
}

// =============================================================================
// Sync Fabric object → server
// =============================================================================
async function syncToServer() {
  if (!selectedId) return;
  const active = fabricCanvas.getActiveObject();
  if (!active) return;

  const pos = active.getBoundingRect(true);
  const payload = {
    position: {
      x: pxToMm(pos.left / (fabricCanvas.getZoom())),
      y: pxToMm(pos.top / (fabricCanvas.getZoom())),
      width: pxToMm(active.width * (active.scaleX || 1)),
      height: pxToMm(active.height * (active.scaleY || 1)),
      rotation: active.angle || 0,
    }
  };

  // For text, sync style too
  if (active.type === 'textbox' || active.type === 'text') {
    payload.style = {
      fontSize: active.fontSize,
      color: active.fill,
    };
  } else if (active.type === 'circle' || active.type === 'rect' || active.type === 'triangle') {
    payload.style = { fillColor: active.fill };
  }

  try {
    await fetch(`${SERVER}/api/element/${selectedId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    showError('Failed to sync changes');
  }
}

// =============================================================================
// Event handlers
// =============================================================================

// Canvas selection changes
fabricCanvas.on('selection:created', updateContextBar);
fabricCanvas.on('selection:updated', updateContextBar);
fabricCanvas.on('selection:cleared', updateContextBar);

// Object modified (move/resize/rotate)
fabricCanvas.on('object:modified', syncToServer);

// Text editing committed
fabricCanvas.on('text:changed', (e) => {
  const id = e.target.elementId;
  if (!id) return;
  fetch(`${SERVER}/api/element/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: e.target.text }),
  }).catch(() => showError('Failed to save text'));
});

// Keyboard delete
document.addEventListener('keydown', async (e) => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    const active = fabricCanvas.getActiveObject();
    if (!active) return;
    const id = active.elementId;
    if (!id) return;
    fabricCanvas.remove(active);
    try {
      await fetch(`${SERVER}/api/element/${id}?agent=pwa`, { method: 'DELETE' });
    } catch { showError('Failed to delete element'); }
    updateContextBar();
  }
});

// Context bar size slider
document.getElementById('ctx-size').addEventListener('input', (e) => {
  const active = fabricCanvas.getActiveObject();
  if (!active) return;
  const val = parseInt(e.target.value);
  if (active.type === 'textbox' || active.type === 'text') {
    active.set('fontSize', val);
  } else {
    active.set('scaleX', 1);
    active.set('width', val);
  }
  active.setCoords();
  fabricCanvas.renderAll();
});

document.getElementById('ctx-size').addEventListener('change', syncToServer);

// Context bar color
document.getElementById('ctx-color').addEventListener('input', (e) => {
  const active = fabricCanvas.getActiveObject();
  if (!active) return;
  if (active.type === 'textbox' || active.type === 'text') {
    active.set('fill', e.target.value);
  } else {
    active.set('fill', e.target.value);
  }
  active.setCoords();
  fabricCanvas.renderAll();
});

document.getElementById('ctx-color').addEventListener('change', syncToServer);

// Context bar delete
document.getElementById('ctx-delete').addEventListener('click', async () => {
  const active = fabricCanvas.getActiveObject();
  if (!active) return;
  const id = active.elementId;
  fabricCanvas.remove(active);
  if (id) {
    try { await fetch(`${SERVER}/api/element/${id}?agent=pwa`, { method: 'DELETE' }); }
    catch { showError('Failed to delete element'); }
  }
  updateContextBar();
});

// =============================================================================
// Load state from server
// =============================================================================
async function loadState() {
  showLoading(true);
  try {
    const res = await fetch(`${SERVER}/api/state`);
    if (!res.ok) throw new Error();
    currentState = await res.json();

    // Update title
    const meta = currentState.meta;
    document.getElementById('doc-title').textContent = `Poster Designer — ${meta.template}`;

    renderCanvas(currentState);
  } catch (e) {
    showError(`Cannot connect to server at ${SERVER}`);
    // Retry every 5s
    setTimeout(loadState, 5000);
  } finally {
    showLoading(false);
  }
}

// =============================================================================
// SSE real-time updates
// =============================================================================
let sseConnected = false;
let sseReconnectDelay = 1000;
let agentBadgeTimer = null;
let sseDebounceTimer = null;

// Connect to SSE endpoint
function connectSSE() {
  if (window.EventSource) {
    const evtSource = new EventSource(`${SERVER}/api/events`);

    evtSource.addEventListener('open', () => {
      sseConnected = true;
      sseReconnectDelay = 1000;
      document.getElementById('conn-status').textContent = '🟢';
    });

    evtSource.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        handleSSEEvent(data);
      } catch (e) {
        console.warn('SSE parse error', e);
      }
    });

    evtSource.addEventListener('error', () => {
      sseConnected = false;
      document.getElementById('conn-status').textContent = '🔴';
      // Reconnect with backoff
      setTimeout(connectSSE, sseReconnectDelay);
      sseReconnectDelay = Math.min(sseReconnectDelay * 2, 30000);
    });
  }
}

// Handle incoming SSE events
async function handleSSEEvent(data) {
  const { type, payload } = data;

  switch (type) {
    case 'element_added':
    case 'element_updated':
    case 'element_deleted':
    case 'state_replaced':
      // Debounce rapid updates — only refresh once per 300ms
      if (sseDebounceTimer) clearTimeout(sseDebounceTimer);
      sseDebounceTimer = setTimeout(async () => {
        await refreshCanvas();
        triggerSyncFlash();
      }, 300);
      break;

    case 'compose_complete':
      showNotification('✓ Poster composed!');
      break;

    case 'agent_editing':
      showAgentIndicator(payload.action);
      break;
  }
}

// Refresh canvas from server state
async function refreshCanvas() {
  // Skip if user is actively interacting
  const active = fabricCanvas.getActiveObject();
  if (active && (active.isDragging || active.isMoving)) {
    return; // defer until interaction ends
  }

  try {
    const res = await fetch(`${SERVER}/api/state`);
    if (!res.ok) return;
    currentState = await res.json();
    renderCanvas(currentState);
  } catch (e) {
    // Silently fail — don't interrupt user
  }
}

// Show agent editing indicator
function showAgentIndicator(action) {
  const badge = document.getElementById('agent-badge');
  badge.textContent = `✏️ Nexi: ${action || 'editing…'}`;
  badge.style.display = 'inline';
  if (agentBadgeTimer) clearTimeout(agentBadgeTimer);
  agentBadgeTimer = setTimeout(() => {
    badge.style.display = 'none';
  }, 5000);
}

// Trigger visual sync indicator
function triggerSyncFlash() {
  const el = document.getElementById('sync-flash');
  el.classList.remove('visible');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1500);
}

// Simple notification
function showNotification(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#58A6FF;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:300;animation:fadeIn 0.2s';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.5s'; setTimeout(() => el.remove(), 500); }, 2500);
}

// =============================================================================
// Resize handling
// =============================================================================
window.addEventListener('resize', () => {
  if (currentState) resizeCanvas();
});

// =============================================================================
// Prevent default touch gestures on canvas
// =============================================================================
canvasEl.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
canvasEl.addEventListener('touchmove', (e) => e.stopPropagation(), { passive: true });
canvasEl.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });

// =============================================================================
// PWA: register service worker
// =============================================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// =============================================================================
// Start
// =============================================================================
initShapePicker();
loadState().then(() => {
  // Connect SSE after initial state load to avoid race conditions
  connectSSE();
});
</script>
